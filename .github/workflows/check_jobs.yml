name: Check Jobs

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:          # allow manual triggering from the Actions tab
    inputs:
      seed:
        description: 'Seed mode: mark all current jobs as seen without alerting (use on first run)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run: do not send Telegram messages'
        type: boolean
        default: false

# Required to commit the updated state.json back to the repo
permissions:
  contents: write

# Cancel an in-flight run if a new one starts (avoids overlap during slow fetches)
concurrency:
  group: check-jobs
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: INFO
        run: |
          ARGS=""
          if [ "${{ inputs.seed }}" = "true" ]; then ARGS="$ARGS --seed"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m src.main $ARGS

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if ! git diff --quiet --staged; then
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "No state changes."
          fi
