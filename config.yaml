# Job Tracker Config
# ===================
#
# Edit `companies` to add/remove targets. Each entry needs:
#   - name: display name
#   - fetcher: which fetcher to use (see src/fetchers/ for available)
#   - enabled: true/false to toggle without deleting
#   - ...fetcher-specific fields (slug, host, tenant, site, etc.)
#
# Notes on common ATS systems:
#   greenhouse:        slug = the URL slug at boards.greenhouse.io/{slug}
#   lever:             slug = the slug at jobs.lever.co/{slug}
#   ashby:             slug = the slug at jobs.ashbyhq.com/{slug}
#   workday:           host + tenant + site (visit careers page, URL gives all three)
#                      e.g. nvidia.wd5.myworkdayjobs.com / nvidia / NVIDIAExternalCareerSite
#   smartrecruiters:   slug = the slug at jobs.smartrecruiters.com/{slug}
#   oracle_cloud:      host + site_number (look in careers page network requests)
#
# Companies marked `enabled: false` are tracked here but not polled. To enable,
# verify the slug/host values (most can be found by visiting the company's
# careers page and inspecting the URL or network tab in DevTools).

max_workers: 12   # concurrent HTTP fetches

# ---------------- FILTER ----------------
filter:
  min_score: 3
  require_location_match: true

  include_keywords:
    # Data Science core
    - data scientist
    - data science
    - data analyst
    - data analytics
    - product analyst
    - product data scientist
    - business intelligence
    - analytics engineer
    - quantitative analyst
    - quant analyst
    # ML / AI
    - machine learning
    - ml engineer
    - applied scientist
    - ai engineer
    - ai/ml
    - ai research
    - research engineer
    - research scientist
    - deep learning
    - applied ml
    # NLP / CV / GenAI
    - nlp
    - natural language
    - computer vision
    - llm
    - genai
    - generative ai
    - rag
    - foundation model
    - responsible ai
    - ai governance
    - ai safety
    - ai integrity
    # Risk / Fraud / Healthcare overlaps
    - risk analytics
    - fraud analytics
    - model risk
    - clinical data science
    - bioinformatics
    - real-world evidence
    # Consulting / decision analytics
    - decision analytics
    - analytics consultant
    - data consultant

  exclude_keywords:
    # Seniority disqualifiers - matched as whole words in title
    - senior
    - sr
    - staff
    - principal
    - lead
    - director
    - manager
    - vp
    - head of
    - chief
    - architect
    - executive
    # Wrong job families
    - sales
    - marketing manager
    - recruiter
    - intern
    - internship

  # Level / level-of-experience boosts
  level_signals_positive:
    - new grad
    - new graduate
    - university grad
    - university graduate
    - early career
    - early-career
    - entry level
    - entry-level
    - associate
    - fresher
    - "0-2 years"
    - "0 to 2 years"
    - "1-2 years"
    - "2026"
    - "2027"
    - masters
    - "master's"
    - recent graduate
    - graduate program
    - rotational

  # Location filter - case-insensitive substring match against job's location field.
  locations:
    - united states
    - usa
    - "u.s."
    - " us "
    - " us,"
    - remote
    - new york
    - new york city
    - "ny,"
    - " ny "
    - new jersey
    - "nj,"
    - " nj "
    - san francisco
    - bay area
    - california
    - "ca,"
    - boston
    - "ma,"
    - seattle
    - "wa,"
    - chicago
    - "il,"
    - austin
    - "tx,"
    - atlanta
    - "ga,"
    - washington
    - "dc,"
    - virginia
    - "va,"
    - north carolina
    - "nc,"

